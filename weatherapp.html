<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel = "stylesheet" href = "weatherapp.css">
</head>
<body>
    <div class = "input-container">
        <form class = "weather-form">
            <input type = "text" class = "cityInput" placeholder = "Enter a city name">
            <button class = "fetchWeatherBtn" type = "submit">Get Weather</button>
        </form>
    </div>
    <div class = "weather-container" style = "display: none;">
        <div class="weather-loader" aria-live="polite" aria-label="Loading weather data" hidden>
            <div class="loader">
                <span><span></span><span></span><span></span><span></span></span>
                <div class="base">
                    <span></span>
                    <div class="face"></div>
                </div>
            </div>
            <div class="longfazers">
                <span></span><span></span><span></span><span></span>
            </div>
        </div>
        <div class="weather-content"></div>
    </div>
    <script src = "weatherapp.js"></script>
</body>
</html>
